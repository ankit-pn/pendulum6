[base]
env_name = pendulum6f

[vec]
total_agents = 4096
num_buffers = 4
num_threads = 16

[env]
cart_mass = 1.0
link_mass = 0.2
link_length = 1.0
gravity = 9.8
force_mag = 120.0
dt = 0.005
substeps = 3
damping = 0.01
spring_k = 0.0
x_threshold = 4.0
hold_target = 75
eval_mode = 0

[policy]
hidden_size = 512
num_layers = 2
expansion_factor = 1

[torch]
network = MinGRU
encoder = DefaultEncoder
decoder = DefaultDecoder

[train]
gpus = 1
seed = 42
total_timesteps = 3000000000
learning_rate = 0.0015
anneal_lr = 1
min_lr_ratio = 0.1
gamma = 0.995
gae_lambda = 0.95
replay_ratio = 1
clip_coef = 0.2
vf_coef = 0.5
vf_clip_coef = 1.0
max_grad_norm = 0.5
ent_coef = 0.001
beta1 = 0.9
beta2 = 0.999
eps = 1e-8
minibatch_size = 16384
horizon = 128
vtrace_rho_clip = 1.0
vtrace_c_clip = 1.0
prio_alpha = 0.5
prio_beta0 = 0.5

[sweep]
method = Protein
metric = perf
goal = maximize
